name: Daily Website Backup

on:
  schedule:
    # Runs every day at 12:00 AM UTC
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Backup
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          zip -r "backups/website-backup-$TIMESTAMP.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "backups/*"

      - name: Commit Backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backups/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily website backup $(date +"%Y-%m-%d")"
          git push
